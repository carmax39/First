  </defs>

  <!-- Yellow oval background -->
  <ellipse cx="100" cy="90" rx="97" ry="85" fill="#E8A825"/>

  <!-- Red/orange dotted circle -->
  <g>
    <circle cx="165.0" cy="90.0" r="1.8" fill="#C94930"/>
    <circle cx="163.6" cy="101.4" r="1.8" fill="#C94930"/>
    <circle cx="159.4" cy="112.4" r="1.8" fill="#C94930"/>
    <circle cx="152.6" cy="122.3" r="1.8" fill="#C94930"/>
    <circle cx="143.5" cy="130.9" r="1.8" fill="#C94930"/>
    <circle cx="132.5" cy="137.6" r="1.8" fill="#C94930"/>
    <circle cx="120.1" cy="142.3" r="1.8" fill="#C94930"/>
    <circle cx="106.8" cy="144.7" r="1.8" fill="#C94930"/>
    <circle cx="93.2" cy="144.7" r="1.8" fill="#C94930"/>
    <circle cx="79.9" cy="142.3" r="1.8" fill="#C94930"/>
    <circle cx="67.5" cy="137.6" r="1.8" fill="#C94930"/>
    <circle cx="56.5" cy="130.9" r="1.8" fill="#C94930"/>
    <circle cx="47.4" cy="122.3" r="1.8" fill="#C94930"/>
    <circle cx="40.6" cy="112.4" r="1.8" fill="#C94930"/>
    <circle cx="36.4" cy="101.4" r="1.8" fill="#C94930"/>
    <circle cx="35.0" cy="90.0" r="1.8" fill="#C94930"/>
    <circle cx="36.4" cy="78.6" r="1.8" fill="#C94930"/>
    <circle cx="40.6" cy="67.6" r="1.8" fill="#C94930"/>
    <circle cx="47.4" cy="57.7" r="1.8" fill="#C94930"/>
    <circle cx="56.5" cy="49.1" r="1.8" fill="#C94930"/>
    <circle cx="67.5" cy="42.4" r="1.8" fill="#C94930"/>
    <circle cx="79.9" cy="37.7" r="1.8" fill="#C94930"/>
    <circle cx="93.2" cy="35.3" r="1.8" fill="#C94930"/>
    <circle cx="106.8" cy="35.3" r="1.8" fill="#C94930"/>
    <circle cx="120.1" cy="37.7" r="1.8" fill="#C94930"/>
    <circle cx="132.5" cy="42.4" r="1.8" fill="#C94930"/>
    <circle cx="143.5" cy="49.1" r="1.8" fill="#C94930"/>
    <circle cx="152.6" cy="57.7" r="1.8" fill="#C94930"/>
    <circle cx="159.4" cy="67.6" r="1.8" fill="#C94930"/>
    <circle cx="163.6" cy="78.6" r="1.8" fill="#C94930"/>
  </g>

  <!-- Passion fruit cross-section -->
  <g transform="rotate(-8, 100, 95)">
    <!-- Outer dark purple shell -->
    <ellipse cx="100" cy="95" rx="36" ry="33" fill="#4A1535"/>
    <!-- Inner maroon ring -->
    <ellipse cx="100" cy="94" rx="32" ry="29" fill="#7B2A52"/>
    <!-- White/cream inner rim -->
    <ellipse cx="100" cy="93" rx="27" ry="25" fill="#F5E6D0"/>
    <!-- Green pulp -->
    <ellipse cx="100" cy="93" rx="22" ry="20" fill="#5B8A32"/>
  </g>

  <!-- Seeds -->
  <g fill="#1A4A0E">
    <circle cx="90" cy="86" r="2.2"/>
    <circle cx="98" cy="82" r="2.2"/>
    <circle cx="108" cy="84" r="2.2"/>
    <circle cx="114" cy="90" r="2.2"/>
    <circle cx="89" cy="95" r="2.2"/>
    <circle cx="100" cy="90" r="2.2"/>
    <circle cx="109" cy="94" r="2.2"/>
    <circle cx="94" cy="100" r="2.2"/>
    <circle cx="105" cy="101" r="2.2"/>
    <circle cx="115" cy="97" r="2.2"/>
  </g>

  <!-- PASSION text curved on top -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#8B2252" letter-spacing="4">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">PASSION</textPath>
  </text>

  <!-- FRUIT text curved on bottom -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#8B2252" letter-spacing="6">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">FRUIT</textPath>
  </text>
